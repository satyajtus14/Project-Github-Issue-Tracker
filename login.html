<section class="flex justify-center items-center min-h-screen bg-gray-100">

    <div class="w-11/12 max-w-lg bg-white shadow-xl p-10 space-y-6 text-center border-2 border-white rounded-lg">
    
    <!-- Logo -->
    <div class="space-y-3">
    <img src="./assets/github-logo.png" class="mx-auto w-16">
    <h2 class="text-2xl font-bold">GitHub Issues Tracker</h2>
    <p class="text-gray-500">Sign in to manage your issues</p>
    </div>
    
    <!-- Form -->
    <form id="loginForm" class="space-y-4 text-left">
    <div>

    <label class="label">
    <span class="label-text font-semibold">Username</span>
    </label>
    <input type="text" placeholder="Enter Username" class="input input-bordered w-full" id="username"/>
    <p class="text-sm text-blue-500 mt-1">Default: admin</p>
    </div>
    
    <div>
    <label class="label">
    <span class="label-text font-semibold">Password</span>
    </label>
    
    <input type="password"  placeholder="Enter Password" class="input input-bordered w-full" id="password"/>
    <p class="text-sm text-blue-500 mt-1">Default: admin123</p>
    </div>
    
    <button type="submit" class="btn btn-primary w-full text-white">Sign In</button>
    </form>
    
    <div class="divider">OR</div>
    
    <div class="bg-base-200 p-4 rounded-lg">
    <p class="text-gray-500 text-sm mb-2">Demo Credentials:</p>
    <p><span class="font-semibold">Username:</span> admin</p>
    <p><span class="font-semibold">Password:</span> admin123</p>
    </div>
    
    <p id="error" class="text-red-500"></p>
    
    </div>
    
    </section>


    <!-- Connected JavaScript file -->
    <script src="./scripts/index.js"></script> 
   
</body>
