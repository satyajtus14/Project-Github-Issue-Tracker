<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker | Home Page</title>

        <!-- add favicon -->
        <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

        <!-- Tailwind css link -->
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        
        <!-- daisy UI link -->
        <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
        
        <!-- Font Awesome link for iCON -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        
        <!-- Google Fonts link -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
        
  <!-- Connect with CSS file -->
 <link rel="stylesheet" href="./style.css">
        
</head>
<body class=" bg-gray-200 py-5 w-11/12 mx-auto ">


    <!-- Nav bar Section Design -->
        <header>
          <div class="navbar bg-base-100 shadow-sm px-4">
        
            <!-- Left Side -->
            <div class="navbar-start flex flex-col md:flex-row items-center gap-3">
              <img src="./assets/github-logo.png" class="w-10">
              <p class="text-xl font-semibold">GitHub Issues Tracker</p>
            </div>
        
            <!-- Right Side -->
            <div class="navbar-end items-center flex flex-col md:flex-row gap-3">
               <button id="search-id"><input id="input-search" type="text"  placeholder="Search Issues" class="input input-bordered w-56 md:w-72"/> </button>
                
              <button class="btn btn-primary">
                + New Issue
              </button>
              <button onclick="signOut()" class="btn  text-white px-4 py-2 rounded">
                Sign Out
              </button>
            </div>
        
          </div>
        </header>

  <main class="py-5 px-10 md:px-10 max-w-7xl mx-auto space-y-7">


     <!-- Status Section Design -->
    <section id="status-dashboard" class="w-11/12 mx-auto py-3 p-3 flex justify-between items-center bg-white shadow-xl border-2 border-white rounded-lg" > 
      <div role="tablist" class="tabs gap-2 status-container  ">
        <button onclick="filterJobs('all')" id="all-issue" role="tab" class="btn issue-btn  w-40 border-black btn-active  text-black rounded-md font-medium">All</button>
        <button onclick="filterJobs('open')" id="open-issue-tab" role="tab" class="btn issue-btn w-40 bg-white text-black border-black rounded-md font-normal">Open</button>
        <button onclick="filterJobs('closed')" id="closed-issue-tab" role="tab" class="btn issue-btn w-40 bg-white text-black border-black rounded-md font-normal">Closed</button>
      </div>
    </section>  

     <!-- Display Section Design -->
        <section class="w-11/12 mx-auto py-3 p-3 flex justify-between items-center bg-white shadow-xl border-2 border-white rounded-lg">
          <div class="left flex gap-4">
             <div class="logo mx-auto ">
                <img src="./assets/Aperture.png" alt="" class="w-15 bg-violet-300 rounded-full">
             </div>
             <div class="issue-info">
                <h2 class="text-lg md:text-3xl font-bold" id="total-issue"> </h2>
                <p class="text-neutral/50">Track and manage your project issues</p>
             </div>
    
          </div>
          <div class="right justify-between items-center flex flex-col md:flex-row gap-2">
            <img src="./assets/open.png" alt="open">
            <img src="./assets/close.png" alt="close">
          </div>
        </section>

        <!-- Add Spinning element for loading page -->
   <section id="spinner" class="flex justify-center items-center py-10 ">
    <span class="loading loading-bars loading-xl"></span>
   </section>

         <!-- All Issues Section Design -->
         <section id="issue-card-container" class="all-issues-bank w-11/12 mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mt-10">
  
         </section>



        <!-- Design Modal for displaying specific word details to hide rest behind -->
        <dialog id="word_details_modal" class="modal modal-bottom sm:modal-middle">
          <div id="details-container" class="modal-box">
            <div class="space-y-5">
             
            </div>
            <div class="modal-action">
              <form method="dialog">
                <!-- if there is a button in form, it will close the modal -->
                <!-- <button class="btn">Close</button> -->
                <!-- <button class="btn btn-primary w-50 ">Close</button> -->
              </form>
            </div>
          </div>
        </dialog>



       <!-- Footer Section -->
<footer class="bg-white-100  p-10 w-11/12 mx-auto my-10 flex justify-between items-center">

</footer>
 
</main>    
<!-- Connected JavaScript file -->
 <script src="./scripts/scripts.js"></script>   
</body>
</html>
